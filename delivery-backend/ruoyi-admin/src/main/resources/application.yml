# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  # 甄客验智能评分：通过 Spring AI Alibaba 原生 DashScope 适配调用 Qwen。
  ai:
    model:
      chat: dashscope
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen3.7-max
          temperature: 0.2
          enable-thinking: false
          response-format:
            type: json_object
    retry:
      # 业务任务层负责可审计重试，Spring AI 单次调用不做长时间内置重试。
      max-attempts: 1
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 登录令牌签名密钥，由本地环境变量或 Docker 容器环境变量注入。
  secret: ${TOKEN_SECRET}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# 设为 true 后，已发布的甄客验会在发布成功后异步评分。
shop:
  ai-score:
    enabled: false

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.web.controller.tool

# 生产健康检查：仅公开总体状态，内部自动检查应用、数据库、Redis 与磁盘。
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 微信支付 APIv3 配置。公开标识和路径保留在此处，真实密钥由环境变量注入。
wechat-pay:
  enabled: true
  # 与微信支付商户号绑定的已认证服务号 AppID；当前仅用于微信内 JSAPI 支付。
  app-id: wx445f3b9c251e7617
  # 仅用于微信内网页 snsapi_base 授权换取 OpenID，不会返回给前端。
  app-secret: ${WECHAT_PAY_APP_SECRET}
  merchant-id: 1704306287
  # 商户 API 证书序列号，必须与下方私钥来自同一套证书。
  merchant-serial-number: 28431D1FB21B77B728A64D2EAB776DDAE77F5710
  # 部署时把与证书序列号匹配的 apiclient_key.pem 挂载到该容器路径。
  private-key-path: /app/certs/apiclient_key.pem
  # APIv3 密钥用于平台证书和支付/退款通知解密。
  api-v3-key: ${WECHAT_PAY_API_V3_KEY}
  # 当前使用自动下载平台证书模式，不需要配置微信支付公钥 ID 和公钥文件。
  credential-mode: AUTO_CERTIFICATE
  # 两个通知地址必须是公网 HTTPS、不能携带查询参数，并转发到当前后端。
  payment-notify-url: https://miniats.cboo.cloud/api/shop/payments/wechat/notify/payment
  refund-notify-url: https://miniats.cboo.cloud/api/shop/payments/wechat/notify/refund
  # 公众号网页授权后返回的前端页面，不要携带查询参数。
  frontend-return-url: https://miniats.cboo.cloud/
  # 用于签署公众号 OAuth state，至少 32 个字符且不要与登录 token 密钥复用。
  oauth-state-secret: ${WECHAT_PAY_OAUTH_STATE_SECRET}

# 阿里云市场物流查询配置（APPCODE 鉴权）。购买订单和线上试用共用本配置。
aliyun-logistics:
  enabled: true
  # 默认适配阿里云市场“全国快递物流查询”接口；请求时只发送 no=运单号，不发送 type 或手机号。
  endpoint: https://wuliu.market.alicloudapi.com/kdi
  # 阿里云物流 AppCode，由环境变量注入。
  app-code: ${ALIYUN_LOGISTICS_APP_CODE:}
  # 与阿里云建立连接的最长等待秒数。
  connect-timeout-seconds: 5
  # 单次物流查询的最长等待秒数。
  request-timeout-seconds: 8
